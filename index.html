<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>指纹打卡</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

html, body {
  height: 100%;
  width: 100%;
  overflow: hidden;
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif;
}

#app {
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
  background: #0d1117;
  transition: background 1s ease;
}
#app.success {
  background: linear-gradient(160deg, #1a7a3c 0%, #25a050 100%);
}

/* 动态背景渐变层 */
#bg-grad {
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse at 30% 40%, rgba(0,120,255,0.15) 0%, transparent 60%),
    radial-gradient(ellipse at 75% 65%, rgba(80,0,200,0.12) 0%, transparent 55%),
    radial-gradient(ellipse at 55% 20%, rgba(0,200,180,0.09) 0%, transparent 50%);
  animation: bgShift 6s ease-in-out infinite alternate;
  pointer-events: none;
  transition: opacity 0.8s;
}
#app.success #bg-grad { opacity: 0; }
@keyframes bgShift {
  0%   { opacity: 0.7; transform: scale(1); }
  100% { opacity: 1;   transform: scale(1.08); }
}

/* 网格线 */
#grid {
  position: absolute; inset: 0;
  background-image:
    linear-gradient(rgba(0,180,255,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,180,255,0.04) 1px, transparent 1px);
  background-size: 36px 36px;
  pointer-events: none;
  transition: opacity 0.8s;
}
#app.success #grid { opacity: 0; }

/* 背景粒子 */
#canvas-bg {
  position: absolute; inset: 0;
  pointer-events: none;
  transition: opacity 0.8s;
}
#app.success #canvas-bg { opacity: 0; }

/* 粒子爆发 */
#particles { position: absolute; inset: 0; pointer-events: none; overflow: hidden; }
.pt {
  position: absolute;
  border-radius: 50%;
  background: rgba(255,255,255,0.65);
  animation: ptRise 2s ease-out forwards;
}
@keyframes ptRise {
  0%   { transform: translateY(0) scale(1); opacity: 0.8; }
  100% { transform: translateY(-260px) scale(0.1); opacity: 0; }
}

/* 顶部状态栏区域 */
#status-bar {
  position: absolute;
  top: max(env(safe-area-inset-top), 16px);
  left: 0; right: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  pointer-events: none;
}
#status-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: rgba(0,180,255,0.7);
  margin-right: 6px;
  animation: blink 2s ease-in-out infinite;
}
@keyframes blink {
  0%,100% { opacity: 1; } 50% { opacity: 0.3; }
}
#status-text {
  font-size: 11px;
  letter-spacing: 0.2em;
  color: rgba(0,180,255,0.6);
  text-transform: uppercase;
}

/* 主内容区 */
#content {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 0;
  position: relative;
  z-index: 2;
  padding: 0 24px;
  width: 100%;
}

#top-label {
  font-size: clamp(15px, 4vw, 18px);
  font-weight: 400;
  color: rgba(200,220,255,0.85);
  margin-bottom: 6px;
  letter-spacing: 0.06em;
  text-align: center;
  transition: opacity 0.4s;
}
#sub-label {
  font-size: clamp(10px, 2.8vw, 12px);
  color: rgba(100,160,255,0.55);
  margin-bottom: clamp(28px, 6vw, 44px);
  letter-spacing: 0.2em;
  text-transform: uppercase;
  text-align: center;
  transition: opacity 0.4s;
}

/* 指纹按钮 */
#fp-wrap {
  width: clamp(140px, 38vw, 180px);
  height: clamp(140px, 38vw, 180px);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  position: relative;
  user-select: none;
  -webkit-user-select: none;
  touch-action: none;
  flex-shrink: 0;
}

/* 发光圆圈 idle */
#glow-ring {
  position: absolute;
  inset: -8px;
  border-radius: 50%;
  border: 1.5px solid rgba(0,180,255,0.5);
  box-shadow:
    0 0 10px 2px rgba(0,180,255,0.35),
    0 0 30px 8px rgba(0,180,255,0.18),
    inset 0 0 12px rgba(0,180,255,0.08);
  animation: glowPulse 2s ease-in-out infinite;
  transition: opacity 0.3s;
}
#fp-wrap.scanning #glow-ring,
#fp-wrap.done #glow-ring { opacity: 0; }
@keyframes glowPulse {
  0%,100% {
    box-shadow: 0 0 8px 2px rgba(0,180,255,0.3), 0 0 26px 6px rgba(0,180,255,0.13);
    border-color: rgba(0,180,255,0.38);
  }
  50% {
    box-shadow: 0 0 20px 6px rgba(0,180,255,0.58), 0 0 52px 16px rgba(0,180,255,0.24);
    border-color: rgba(80,200,255,0.82);
  }
}

/* 暗底圆圈 */
#fp-ring-bg {
  position: absolute; inset: 0;
  border-radius: 50%;
  border: 1.5px solid rgba(255,255,255,0.08);
  background: rgba(255,255,255,0.03);
}

/* 进度环 SVG */
#progress-svg {
  position: absolute;
  inset: -6px;
  width: calc(100% + 12px);
  height: calc(100% + 12px);
  transform: rotate(-90deg);
  pointer-events: none;
}
#progress-circle {
  fill: none;
  stroke: #3dde80;
  stroke-width: 4.5;
  stroke-linecap: round;
  stroke-dasharray: 565;
  stroke-dashoffset: 565;
  filter: drop-shadow(0 0 6px rgba(61,222,128,0.75));
}

/* 扫描光束 */
#scan-mask {
  position: absolute;
  left: 14px; right: 14px; top: 14px; bottom: 14px;
  border-radius: 50%;
  overflow: hidden;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.2s;
}
#scan-beam {
  position: absolute; left: 0; right: 0;
  height: 5px;
  background: linear-gradient(to bottom, rgba(61,222,128,0) 0%, rgba(61,222,128,0.85) 50%, rgba(61,222,128,0) 100%);
  animation: beamMove 0.62s linear infinite;
}
@keyframes beamMove {
  0% { top: -5px; } 100% { top: 100%; }
}

/* 指纹图案 */
#fp-svg {
  width: 62%;
  height: 62%;
}
.fp-stroke {
  stroke: rgba(100,160,255,0.75);
  transition: stroke 0.6s;
}
#fp-wrap.done .fp-stroke { stroke: rgba(255,255,255,0.9); }

/* 成功文字 */
#result {
  margin-top: clamp(20px, 5vw, 32px);
  font-size: clamp(20px, 5.5vw, 26px);
  font-weight: 500;
  color: #fff;
  text-align: center;
  opacity: 0;
  transition: opacity 0.7s;
  letter-spacing: 0.04em;
}
#result.show { opacity: 1; }
#timer {
  margin-top: 8px;
  font-size: clamp(12px, 3vw, 14px);
  color: rgba(255,255,255,0.72);
  opacity: 0;
  transition: opacity 0.5s;
  text-align: center;
  letter-spacing: 0.05em;
}
#timer.show { opacity: 1; }

/* 底部提示 */
#hint-bottom {
  position: absolute;
  bottom: max(env(safe-area-inset-bottom), 28px);
  left: 0; right: 0;
  text-align: center;
  font-size: 11px;
  color: rgba(100,140,200,0.4);
  letter-spacing: 0.12em;
  pointer-events: none;
  transition: opacity 0.4s;
}
#app.success #hint-bottom { opacity: 0; }
</style>
</head>
<body>

<div id="app">
  <div id="bg-grad"></div>
  <canvas id="canvas-bg"></canvas>
  <div id="grid"></div>
  <div id="particles"></div>

  <div id="status-bar">
    <div id="status-dot"></div>
    <span id="status-text">系统就绪</span>
  </div>

  <div id="content">
    <div id="top-label">请将手指按住此处</div>
    <div id="sub-label">指纹扫描区域</div>

    <div id="fp-wrap" role="button" tabindex="0" aria-label="指纹打卡按钮">
      <div id="glow-ring"></div>
      <svg id="progress-svg" viewBox="0 0 192 192">
        <circle id="progress-circle" cx="96" cy="96" r="90"/>
      </svg>
      <div id="fp-ring-bg"></div>
      <div id="scan-mask"><div id="scan-beam"></div></div>

      <svg id="fp-svg" viewBox="0 0 110 110" fill="none" xmlns="http://www.w3.org/2000/svg">
        <g class="fp-stroke" stroke-linecap="round" stroke-linejoin="round" fill="none">
          <path stroke-width="2.4" d="M 21 62 C 18 54 17 46 18 38 C 21 20 37 8 55 8 C 73 8 89 20 92 38 C 93 46 92 54 89 62"/>
          <path stroke-width="2.2" d="M 27 70 C 23 61 22 51 24 42 C 27 27 40 17 55 17 C 70 17 83 27 86 42 C 88 51 87 61 83 70"/>
          <path stroke-width="2.1" d="M 33 78 C 29 69 28 58 30 49 C 33 36 43 27 55 27 C 67 27 77 36 80 49 C 82 58 81 69 77 78"/>
          <path stroke-width="2.0" d="M 39 86 C 35 77 34 66 36 57 C 39 46 46 38 55 36 C 64 38 71 46 74 57 C 76 66 75 77 71 86"/>
          <path stroke-width="1.9" d="M 44 93 C 41 84 40 74 42 65 C 44 55 49 47 55 45 C 61 47 66 55 68 65 C 70 74 69 84 66 93"/>
          <path stroke-width="1.8" d="M 49 98 C 47 89 47 79 48 70 C 49 61 52 54 55 52 C 58 54 61 61 62 70 C 63 79 63 89 61 98"/>
          <path stroke-width="1.6" d="M 37 14 C 29 19 24 27 22 36"/>
          <path stroke-width="1.6" d="M 73 14 C 81 19 86 27 88 36"/>
        </g>
      </svg>
    </div>

    <div id="result">打卡成功，欢迎上班！</div>
    <div id="timer"></div>
  </div>

</div>

<script>
(function () {
  const HOLD_MS = 2000;
  const CIRC = 565;

  let audioCtx = null, holding = false, startTime = null;
  let rafId = null, done = false;
  let riseOsc = null, riseGain = null;
  let alarmOscs = [], countdownIv = null;

  /* ── 背景粒子 ── */
  const canvas = document.getElementById('canvas-bg');
  const appEl = document.getElementById('app');
  let dots = [];

  function resizeCanvas() {
    canvas.width = appEl.offsetWidth;
    canvas.height = appEl.offsetHeight;
  }
  function initDots() {
    resizeCanvas();
    dots = Array.from({ length: 42 }, () => ({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: 0.8 + Math.random() * 1.5,
      vx: (Math.random() - 0.5) * 0.28,
      vy: (Math.random() - 0.5) * 0.28,
      a: 0.15 + Math.random() * 0.45
    }));
  }
  function drawDots() {
    if (done) return;
    const ctx2 = canvas.getContext('2d');
    ctx2.clearRect(0, 0, canvas.width, canvas.height);
    dots.forEach(d => {
      d.x += d.vx; d.y += d.vy;
      if (d.x < 0) d.x = canvas.width;
      if (d.x > canvas.width) d.x = 0;
      if (d.y < 0) d.y = canvas.height;
      if (d.y > canvas.height) d.y = 0;
      ctx2.beginPath();
      ctx2.arc(d.x, d.y, d.r, 0, Math.PI * 2);
      ctx2.fillStyle = `rgba(100,180,255,${d.a})`;
      ctx2.fill();
    });
    requestAnimationFrame(drawDots);
  }
  window.addEventListener('resize', () => { resizeCanvas(); });
  initDots();
  drawDots();

  /* ── 音频（iOS 兼容）── */
  // iOS Safari 要求：AudioContext 必须在用户手势内同步创建 + 播放静音片段解锁
  function ac() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx.state === 'suspended') {
      audioCtx.resume();
    }
    return audioCtx;
  }

  // 第一次触摸时：同步创建并解锁 AudioContext
  function iosUnlock() {
    if (audioCtx && audioCtx.state === 'running') return;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    // 播放 1 帧静音 —— iOS 必须这一步才能真正解锁
    const buf = audioCtx.createBuffer(1, 1, audioCtx.sampleRate);
    const src = audioCtx.createBufferSource();
    src.buffer = buf;
    src.connect(audioCtx.destination);
    src.start(0);
    audioCtx.resume();
  }
  document.addEventListener('touchstart', iosUnlock, { once: true });
  document.addEventListener('mousedown',  iosUnlock, { once: true });

  function startRise() {
    const c = ac();
    riseOsc = c.createOscillator();
    riseGain = c.createGain();
    riseOsc.type = 'sine';
    riseOsc.frequency.setValueAtTime(200, c.currentTime);
    riseOsc.frequency.linearRampToValueAtTime(900, c.currentTime + HOLD_MS / 1000);
    riseGain.gain.setValueAtTime(0, c.currentTime);
    riseGain.gain.linearRampToValueAtTime(0.16, c.currentTime + HOLD_MS / 1000);
    riseOsc.connect(riseGain);
    riseGain.connect(c.destination);
    riseOsc.start();
  }

  function stopRise(instant) {
    if (!riseOsc) return;
    try {
      if (instant) riseGain.gain.setValueAtTime(0, audioCtx.currentTime);
      else riseGain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.15);
      riseOsc.stop(audioCtx.currentTime + 0.2);
    } catch (e) {}
    riseOsc = null; riseGain = null;
  }

  function playChime() {
    const c = ac();
    [523.25, 659.25, 783.99, 1046.50].forEach((f, i) => {
      const o = c.createOscillator(), g = c.createGain();
      const t = c.currentTime + i * 0.09;
      o.type = i < 2 ? 'sine' : 'triangle';
      o.frequency.value = f;
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(0.22, t + 0.025);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.55);
      o.connect(g); g.connect(c.destination);
      o.start(t); o.stop(t + 0.6);
    });
  }

  function playRadar(sec) {
    const c = ac();
    let t = c.currentTime + 0.6;
    const end = t + sec;
    const base = 1046.50;
    const harms = [base, base * 1.5, base * 2];
    const vols = [0.26, 0.09, 0.035];
    function beep(st, dur) {
      harms.forEach((f, i) => {
        const o = c.createOscillator(), g = c.createGain();
        o.type = 'sine'; o.frequency.value = f;
        g.gain.setValueAtTime(0, st);
        g.gain.linearRampToValueAtTime(vols[i], st + 0.012);
        g.gain.setValueAtTime(vols[i] * 0.85, st + dur - 0.03);
        g.gain.linearRampToValueAtTime(0, st + dur);
        o.connect(g); g.connect(c.destination);
        o.start(st); o.stop(st + dur + 0.01);
        alarmOscs.push(o);
      });
    }
    while (t + 0.115 < end) {
      beep(t, 0.115); t += 0.21;
      if (t + 0.115 < end) { beep(t, 0.115); t += 0.835; }
    }
  }

  function stopAlarm() {
    alarmOscs.forEach(o => { try { o.stop(); } catch (e) {} });
    alarmOscs = [];
  }

  // 低频轰鸣 1s
  function playLowRumble(sec) {
    const c = ac();
    const sr = c.sampleRate;
    const now = c.currentTime;
    const buf = c.createBuffer(1, Math.ceil(sr * sec), sr);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
    const src = c.createBufferSource();
    src.buffer = buf;
    const flt = c.createBiquadFilter();
    flt.type = 'lowpass'; flt.frequency.value = 180; flt.Q.value = 1.2;
    const g = c.createGain();
    g.gain.setValueAtTime(0, now);
    g.gain.linearRampToValueAtTime(0.7, now + 0.1);
    g.gain.setValueAtTime(0.65, now + sec - 0.2);
    g.gain.linearRampToValueAtTime(0, now + sec);
    // 叠加低沉振荡器增加厚重感
    [55, 80, 110].forEach((f, i) => {
      const o = c.createOscillator(), og = c.createGain();
      o.type = 'sine'; o.frequency.value = f;
      og.gain.setValueAtTime(0, now);
      og.gain.linearRampToValueAtTime([0.18, 0.10, 0.06][i], now + 0.08);
      og.gain.linearRampToValueAtTime(0, now + sec);
      o.connect(og); og.connect(c.destination);
      o.start(now); o.stop(now + sec);
    });
    src.connect(flt); flt.connect(g); g.connect(c.destination);
    src.start(now); src.stop(now + sec);
  }

  // 霸道总裁男中音（iOS 兼容）
  function playCEOVoice() {
    if (!window.speechSynthesis) return;
    window.speechSynthesis.cancel();

    const utter = new SpeechSynthesisUtterance('Good morning, time to work');
    utter.lang = 'en-US';
    utter.pitch = 0.15;
    utter.rate = 0.72;
    utter.volume = 1;

    const doSpeak = () => {
      const voices = window.speechSynthesis.getVoices();
      // iOS 上优先 Daniel（英音男声），其次任意英文声音
      const male = voices.find(v => /daniel/i.test(v.name))
        || voices.find(v => /david|alex|fred|bruce|ralph|thomas/i.test(v.name) && /en/i.test(v.lang))
        || voices.find(v => /en-US/i.test(v.lang))
        || voices.find(v => /en/i.test(v.lang));
      if (male) utter.voice = male;
      // iOS Safari 需要在用户手势链内调用 speak，这里通过 setTimeout(0) 保持同步链
      window.speechSynthesis.speak(utter);
    };

    const voices = window.speechSynthesis.getVoices();
    if (voices.length > 0) {
      doSpeak();
    } else {
      // iOS 上 voiceschanged 可能不触发，用轮询兜底
      let tries = 0;
      const poll = setInterval(() => {
        tries++;
        if (window.speechSynthesis.getVoices().length > 0 || tries > 20) {
          clearInterval(poll);
          doSpeak();
        }
      }, 100);
    }
  }

  // 世界杯欢呼音效：stadium roar
  function playApplause(sec) {
    const c = ac();
    const sr = c.sampleRate;
    const now = c.currentTime;

    function makeNoise(dur) {
      const buf = c.createBuffer(2, Math.ceil(sr * dur), sr);
      for (let ch = 0; ch < 2; ch++) {
        const d = buf.getChannelData(ch);
        for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
      }
      return buf;
    }

    // 层1：球场低频轰鸣（巨大共鸣感）
    const rumbleSrc = c.createBufferSource();
    rumbleSrc.buffer = makeNoise(sec);
    const rumbleF = c.createBiquadFilter();
    rumbleF.type = 'lowpass'; rumbleF.frequency.value = 320; rumbleF.Q.value = 0.7;
    const rumbleG = c.createGain();
    rumbleG.gain.setValueAtTime(0, now);
    rumbleG.gain.linearRampToValueAtTime(0.55, now + 0.08);
    rumbleG.gain.setValueAtTime(0.5, now + sec - 0.35);
    rumbleG.gain.linearRampToValueAtTime(0, now + sec);
    rumbleSrc.connect(rumbleF); rumbleF.connect(rumbleG); rumbleG.connect(c.destination);
    rumbleSrc.start(now); rumbleSrc.stop(now + sec);


    // 层4：集体"OHHHH"上扬人声（世界杯进球瞬间感）
    const ohFreqs = [180, 230, 290, 360, 460, 580, 720];
    ohFreqs.forEach((f, i) => {
      const o = c.createOscillator();
      const g = c.createGain();
      o.type = i % 2 === 0 ? 'sawtooth' : 'sine';
      // 音调从低拉高，模拟"噢——！"
      o.frequency.setValueAtTime(f * 0.75, now);
      o.frequency.linearRampToValueAtTime(f * 1.25, now + sec * 0.5);
      o.frequency.linearRampToValueAtTime(f * 1.1, now + sec);
      const vol = 0.038 / (i * 0.4 + 1);
      g.gain.setValueAtTime(0, now);
      g.gain.linearRampToValueAtTime(vol, now + 0.1);
      g.gain.setValueAtTime(vol * 0.9, now + sec - 0.3);
      g.gain.linearRampToValueAtTime(0, now + sec);
      // 轻微颤音模拟人声波动
      const vib = c.createOscillator();
      const vibG = c.createGain();
      vib.frequency.value = 5 + Math.random() * 3;
      vibG.gain.value = f * 0.018;
      vib.connect(vibG); vibG.connect(o.frequency);
      vib.start(now); vib.stop(now + sec);
      o.connect(g); g.connect(c.destination);
      o.start(now); o.stop(now + sec);
    });

    // 层5：开场爆发冲击波（进球瞬间）
    [0, 0.03].forEach(dt => {
      const impSrc = c.createBufferSource();
      impSrc.buffer = makeNoise(0.25);
      const impF = c.createBiquadFilter();
      impF.type = 'bandpass'; impF.frequency.value = 600; impF.Q.value = 0.5;
      const impG = c.createGain();
      const t0 = now + dt;
      impG.gain.setValueAtTime(0.7, t0);
      impG.gain.exponentialRampToValueAtTime(0.001, t0 + 0.25);
      impSrc.connect(impF); impF.connect(impG); impG.connect(c.destination);
      impSrc.start(t0); impSrc.stop(t0 + 0.26);
    });

    // 层6：vuvuzela 风格持续嗡嗡（世界杯标志音）
    [233, 466, 699].forEach((f, i) => {
      const o = c.createOscillator();
      const g = c.createGain();
      o.type = 'sawtooth';
      o.frequency.value = f;
      const vol = [0.06, 0.03, 0.015][i];
      g.gain.setValueAtTime(0, now + 0.1);
      g.gain.linearRampToValueAtTime(vol, now + 0.35);
      g.gain.setValueAtTime(vol, now + sec - 0.3);
      g.gain.linearRampToValueAtTime(0, now + sec);
      o.connect(g); g.connect(c.destination);
      o.start(now + 0.1); o.stop(now + sec);
    });
  }

  /* ── 进度环 ── */
  function setProgress(p) {
    document.getElementById('progress-circle').style.strokeDashoffset = CIRC * (1 - p);
  }

  function frame() {
    if (!holding || done) return;
    const p = Math.min((Date.now() - startTime) / HOLD_MS, 1);
    setProgress(p);
    if (p < 1) { rafId = requestAnimationFrame(frame); }
    else { complete(); }
  }

  /* ── 触摸 / 鼠标事件 ── */
  const fpWrap = document.getElementById('fp-wrap');

  function startScan(e) {
    if (done || holding) return;
    if (e) e.preventDefault();
    holding = true;
    startTime = Date.now();
    fpWrap.classList.add('scanning');
    document.getElementById('scan-mask').style.opacity = '1';
    startRise();
    rafId = requestAnimationFrame(frame);
  }

  function endScan() {
    if (done || !holding) return;
    holding = false;
    cancelAnimationFrame(rafId);
    stopRise(false);
    fpWrap.classList.remove('scanning');
    document.getElementById('scan-mask').style.opacity = '0';
    setProgress(0);
  }

  fpWrap.addEventListener('mousedown', startScan);
  fpWrap.addEventListener('touchstart', startScan, { passive: false });
  fpWrap.addEventListener('mouseup', endScan);
  fpWrap.addEventListener('touchend', endScan);
  fpWrap.addEventListener('mouseleave', endScan);
  fpWrap.addEventListener('touchcancel', endScan);

  /* ── 粒子爆发 ── */
  function spawnParticles() {
    const box = document.getElementById('particles');
    for (let i = 0; i < 26; i++) {
      setTimeout(() => {
        const p = document.createElement('div');
        p.className = 'pt';
        const s = 5 + Math.random() * 10;
        p.style.cssText = `width:${s}px;height:${s}px;left:${10 + Math.random() * 80}%;top:${20 + Math.random() * 60}%;animation-duration:${1.3 + Math.random() * 1.3}s;animation-delay:${Math.random() * 0.4}s`;
        box.appendChild(p);
        setTimeout(() => p.remove(), 3200);
      }, i * 48);
    }
  }

  /* ── 完成 ── */
  function complete() {
    done = true; holding = false;
    cancelAnimationFrame(rafId);
    stopRise(true);
    setProgress(1);
    fpWrap.classList.add('done');
    document.getElementById('scan-mask').style.opacity = '0';
    document.getElementById('top-label').style.opacity = '0';
    document.getElementById('sub-label').style.opacity = '0';

    setTimeout(() => {
      appEl.classList.add('success');
      spawnParticles();
      playChime();
      playRadar(3);
      document.getElementById('result').classList.add('show');
      document.getElementById('timer').classList.add('show');

      let s = 3;
      const el = document.getElementById('timer');
      el.textContent = `响铃中 ${s}s...`;
      countdownIv = setInterval(() => {
        s--;
        if (s <= 0) {
          clearInterval(countdownIv);
          stopAlarm();
          // 第一步：低频轰鸣 1s
          el.textContent = '';
          playLowRumble(1);
          // 第二步：1s 后霸道总裁开口
          setTimeout(() => {
            playCEOVoice();
            // 第三步：语音结束后显示最终文字
            setTimeout(() => {
              el.innerHTML = '祝您工作顺利<br>距离下班仅有 480 分钟';
            }, 2200);
          }, 1000);
        } else {
          el.textContent = `响铃中 ${s}s...`;
        }
      }, 1000);
    }, 220);
  }
})();
</script>
